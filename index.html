<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#0d0d0e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="FLUXO">
<title>FLUXO — Leitor RSVP</title>
<style>
  :root {
    --bg: #0d0d0e;
    --surface: #17171a;
    --surface-2: #1f1f23;
    --line: #26262b;
    --text: #ece9e3;
    --muted: #7c7c84;
    --red: #e8483f;
    --red-dim: #7e2a26;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", sans-serif;
    overflow: hidden;
    user-select: none;
    -webkit-user-select: none;
  }
  .view {
    position: fixed;
    inset: 0;
    display: none;
    flex-direction: column;
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  }
  .view.active { display: flex; }
  .mono { font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace; }

  /* =============== LIBRARY =============== */
  #lib-head {
    padding: 22px 20px 8px;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
  }
  #lib-head h1 {
    font-family: "American Typewriter", ui-serif, Georgia, serif;
    font-size: 34px;
    font-weight: 600;
    letter-spacing: 0.01em;
  }
  #lib-head .wordmark {
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    font-size: 11px;
    letter-spacing: 0.35em;
    color: var(--muted);
    padding-bottom: 8px;
  }
  #lib-head .wordmark b { color: var(--red); font-weight: 600; }
  #doc-list {
    flex: 1;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    padding: 10px 20px 120px;
  }
  .doc-row {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 16px;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 14px;
    cursor: pointer;
  }
  .doc-row:active { background: var(--surface-2); }
  .doc-info { flex: 1; min-width: 0; }
  .doc-title {
    font-family: "American Typewriter", ui-serif, Georgia, serif;
    font-size: 16px;
    font-weight: 600;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-bottom: 7px;
  }
  .doc-meta {
    display: flex;
    align-items: center;
    gap: 10px;
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    font-size: 11px;
    color: var(--muted);
  }
  .doc-badge {
    background: var(--surface-2);
    border: 1px solid var(--line);
    border-radius: 999px;
    padding: 3px 9px;
  }
  .doc-badge.reading { color: var(--red); border-color: var(--red-dim); }
  .doc-prog {
    height: 3px;
    background: var(--line);
    border-radius: 2px;
    margin-top: 9px;
    overflow: hidden;
  }
  .doc-prog i { display: block; height: 100%; background: var(--red); }
  .doc-del {
    background: none;
    border: 1px solid var(--line);
    color: var(--muted);
    border-radius: 10px;
    width: 38px;
    height: 38px;
    flex: 0 0 38px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 15px;
  }
  .doc-del.confirm { color: var(--red); border-color: var(--red); }
  /* continuar de onde parou */
  #continue {
    background: linear-gradient(180deg, rgba(232,72,63,0.10), rgba(232,72,63,0.02));
    border: 1px solid var(--red-dim);
    border-radius: 16px;
    padding: 18px;
    margin-bottom: 20px;
    cursor: pointer;
    display: none;
  }
  #continue.show { display: block; }
  #continue:active { background: var(--surface-2); }
  #continue .eyebrow {
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    font-size: 9px;
    letter-spacing: 0.22em;
    color: var(--red);
    margin-bottom: 9px;
  }
  #continue .ct-title {
    font-family: "American Typewriter", ui-serif, Georgia, serif;
    font-size: 19px;
    font-weight: 600;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  #continue .ct-snip {
    font-family: "American Typewriter", ui-serif, Georgia, serif;
    font-size: 13px;
    line-height: 1.5;
    color: var(--muted);
    margin-top: 8px;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  #continue .ct-foot {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    margin-top: 14px;
  }
  #continue .ct-meta {
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    font-size: 11px;
    color: var(--muted);
  }
  #continue .ct-go {
    background: var(--red);
    color: #fff;
    border: none;
    border-radius: 999px;
    padding: 10px 20px;
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    font-size: 11px;
    letter-spacing: 0.1em;
    font-weight: 600;
    pointer-events: none;
  }

  #empty {
    border: 1px dashed var(--line);
    border-radius: 14px;
    padding: 26px 20px;
    color: var(--muted);
    font-size: 14px;
    line-height: 1.55;
    text-align: center;
  }
  #btn-add {
    position: absolute;
    right: 20px;
    bottom: calc(24px + env(safe-area-inset-bottom));
    width: 60px;
    height: 60px;
    border-radius: 50%;
    background: var(--red);
    color: #fff;
    border: none;
    font-size: 28px;
    font-weight: 300;
    line-height: 1;
    cursor: pointer;
    box-shadow: 0 6px 24px rgba(232, 72, 63, 0.35);
  }
  #btn-add:active { transform: scale(0.96); }

  /* =============== READER =============== */
  #rd-head {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 18px 10px;
  }
  #rd-close {
    background: none;
    border: 1px solid var(--line);
    color: var(--text);
    border-radius: 50%;
    width: 38px;
    height: 38px;
    flex: 0 0 38px;
    font-size: 16px;
    cursor: pointer;
  }
  #rd-title {
    flex: 1;
    font-family: "American Typewriter", ui-serif, Georgia, serif;
    font-size: 14px;
    color: var(--muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  #rd-pct { font-size: 12px; color: var(--muted); min-width: 36px; text-align: right; }

  #stage {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    min-height: 0;
    touch-action: none;
    cursor: pointer;
  }
  .guide {
    width: min(88vw, 560px);
    position: relative;
    height: 1px;
    background: var(--line);
  }
  .guide::after {
    content: "";
    position: absolute;
    left: 40%;
    width: 2px;
    height: 10px;
    background: var(--red-dim);
    transform: translateX(-1px);
  }
  .guide.top::after { top: 0; }
  .guide.bottom::after { bottom: 0; }
  #word-row {
    position: relative;
    width: min(88vw, 560px);
    height: 118px;
    overflow: hidden;
  }
  #word-inner {
    position: absolute;
    left: 40%;
    top: 50%;
    white-space: nowrap;
    font-family: "American Typewriter", ui-serif, Georgia, serif;
    font-size: var(--word-size, 42px);
    font-weight: 600;
    line-height: 1;
    transform: translate(0, -50%);
  }
  #w-piv { color: var(--red); }
  #below {
    position: absolute;
    top: calc(50% + 82px);
    left: 50%;
    transform: translateX(-50%);
    width: min(88vw, 560px);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 18px;
    pointer-events: none;
  }
  #hint {
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    font-size: 12px;
    color: var(--muted);
    text-align: center;
    padding: 0 12px;
    line-height: 1.6;
  }
  #context {
    width: 100%;
    font-family: "American Typewriter", ui-serif, Georgia, serif;
    font-size: 15px;
    line-height: 1.6;
    color: var(--muted);
    text-align: center;
    display: none;
    max-height: 24vh;
    overflow: hidden;
  }
  #context mark { background: none; color: var(--red); }

  /* ---- deck ---- */
  #deck {
    padding: 12px 20px calc(16px + env(safe-area-inset-bottom));
    border-top: 1px solid var(--line);
    display: flex;
    flex-direction: column;
    gap: 13px;
  }
  #scrub-row {
    display: flex;
    align-items: center;
    gap: 12px;
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    font-size: 11px;
    color: var(--muted);
  }
  #scrub-row time { min-width: 52px; }
  #scrub-row time:last-child { text-align: right; }
  #transport {
    display: flex;
    align-items: flex-start;
    justify-content: center;
    gap: 22px;
  }
  .t-btn {
    background: none;
    border: 1px solid var(--line);
    color: var(--text);
    border-radius: 50%;
    width: 50px;
    height: 50px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
  }
  .t-btn:active { background: var(--surface); }
  .t-btn svg { display: block; }
  #btn-play { width: 66px; height: 66px; border-color: var(--red-dim); }
  #btn-play.playing { border-color: var(--red); }
  .t-label {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    font-size: 9px;
    letter-spacing: 0.12em;
    color: var(--muted);
  }

  #tempo { display: flex; align-items: center; gap: 14px; }
  #tempo-readout {
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    font-size: 14px;
    color: var(--red);
    min-width: 84px;
    text-align: center;
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 7px 0;
    background: var(--surface);
  }
  #tempo-readout small { color: var(--muted); font-size: 9px; letter-spacing: 0.14em; display: block; margin-top: 2px; }
  .fader-wrap { flex: 1; position: relative; height: 40px; display: flex; align-items: center; }
  .fader-ticks {
    position: absolute;
    inset: 0 2px;
    background-image: repeating-linear-gradient(to right, var(--line) 0 1px, transparent 1px 10%);
    background-size: 100% 8px;
    background-position: center;
    background-repeat: no-repeat;
    pointer-events: none;
  }
  input[type="range"] {
    -webkit-appearance: none;
    appearance: none;
    width: 100%;
    background: transparent;
    position: relative;
    z-index: 1;
  }
  input[type="range"]::-webkit-slider-runnable-track { height: 2px; background: var(--line); }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 18px;
    height: 32px;
    border-radius: 4px;
    background: var(--text);
    border: none;
    margin-top: -15px;
  }
  #scrub::-webkit-slider-thumb { width: 14px; height: 14px; border-radius: 50%; margin-top: -6px; }

  #dwell-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }
  #dwell-row label {
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    font-size: 9px;
    letter-spacing: 0.16em;
    color: var(--muted);
  }
  .seg {
    display: flex;
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 999px;
    overflow: hidden;
  }
  .seg button {
    background: none;
    border: none;
    color: var(--muted);
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    font-size: 10px;
    letter-spacing: 0.08em;
    padding: 8px 15px;
    cursor: pointer;
  }
  .seg button.on { background: var(--red-dim); color: #fff; }

  /* =============== OVERLAYS =============== */
  .sheet {
    position: fixed;
    inset: 0;
    background: rgba(13,13,14,0.94);
    -webkit-backdrop-filter: blur(10px);
    backdrop-filter: blur(10px);
    display: none;
    flex-direction: column;
    padding: calc(20px + env(safe-area-inset-top)) 20px calc(20px + env(safe-area-inset-bottom));
    z-index: 20;
  }
  .sheet.open { display: flex; }
  .sheet-head {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 18px;
  }
  .sheet-head button {
    background: none;
    border: 1px solid var(--line);
    color: var(--text);
    border-radius: 50%;
    width: 38px;
    height: 38px;
    font-size: 16px;
    cursor: pointer;
  }
  .sheet-head h2 {
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.28em;
    color: var(--muted);
  }
  .imp-opt {
    display: flex;
    align-items: center;
    gap: 16px;
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 19px 18px;
    margin-bottom: 12px;
    color: var(--text);
    font-size: 16px;
    width: 100%;
    text-align: left;
    cursor: pointer;
  }
  .imp-opt:active { background: var(--surface-2); }
  .imp-opt svg { flex: 0 0 22px; color: var(--muted); }
  .imp-opt small { display: block; color: var(--muted); font-size: 12px; margin-top: 3px; }
  .imp-opt.sample { border-color: var(--red-dim); }
  #sheet-paste textarea {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 12px;
    color: var(--text);
    font-family: "American Typewriter", ui-serif, Georgia, serif;
    font-size: 15px;
    line-height: 1.6;
    padding: 16px;
    resize: none;
    outline: none;
    user-select: text;
    -webkit-user-select: text;
  }
  #sheet-paste textarea:focus { border-color: var(--red-dim); }
  .sheet-actions { display: flex; gap: 12px; margin-top: 16px; }
  .sheet-actions button {
    flex: 1;
    padding: 15px 0;
    border-radius: 999px;
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    font-size: 13px;
    letter-spacing: 0.08em;
    cursor: pointer;
  }
  .btn-ghost { background: none; border: 1px solid var(--line); color: var(--muted); }
  .btn-solid { background: var(--red); border: none; color: #fff; font-weight: 600; }

  /* explorer */
  #exp-body {
    flex: 1;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    font-family: "American Typewriter", ui-serif, Georgia, serif;
    font-size: 16px;
    line-height: 1.7;
  }
  .exp-p {
    padding: 10px 12px;
    border-left: 2px solid transparent;
    color: var(--muted);
    cursor: pointer;
    border-radius: 6px;
  }
  .exp-p:active { background: var(--surface); }
  .exp-p.current { color: var(--text); border-left-color: var(--red); background: var(--surface); }
  #busy {
    position: fixed;
    inset: 0;
    background: rgba(13,13,14,0.85);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 40;
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    font-size: 12px;
    letter-spacing: 0.2em;
    color: var(--muted);
  }
  #busy.open { display: flex; }

  @media (prefers-reduced-motion: reduce) {
    * { transition: none !important; }
  }
</style>
</head>
<body>

<!-- ================= LIBRARY ================= -->
<div class="view active" id="view-lib">
  <div id="lib-head">
    <h1>Biblioteca</h1>
    <div class="wordmark">FLU<b>X</b>O</div>
  </div>
  <div id="doc-list">
    <div id="continue" role="button" tabindex="0">
      <div class="eyebrow">CONTINUAR DE ONDE PAROU</div>
      <div class="ct-title" id="ct-title"></div>
      <div class="ct-snip" id="ct-snip"></div>
      <div class="ct-foot">
        <span class="ct-meta" id="ct-meta"></span>
        <span class="ct-go">RETOMAR ▶</span>
      </div>
    </div>
    <div id="doc-rows"></div>
  </div>
  <button id="btn-add" aria-label="Importar texto">+</button>
</div>

<!-- ================= READER ================= -->
<div class="view" id="view-reader">
  <div id="rd-head">
    <button id="rd-close" aria-label="Voltar para a biblioteca">✕</button>
    <div id="rd-title"></div>
    <div id="rd-pct" class="mono">0%</div>
  </div>

  <div id="stage" aria-label="Área de leitura">
    <div class="guide top"></div>
    <div id="word-row"><span id="word-inner"><span id="w-pre"></span><span id="w-piv"></span><span id="w-post"></span></span></div>
    <div class="guide bottom"></div>
    <div id="below">
      <div id="context"></div>
      <div id="hint">toque para começar · toque para pausar<br>arraste para percorrer o texto</div>
    </div>
  </div>

  <div id="deck">
    <div id="scrub-row">
      <time id="t-cur">00:00</time>
      <div class="fader-wrap" style="height:30px">
        <input type="range" id="scrub" min="0" max="0" step="1" value="0" aria-label="Posição no texto">
      </div>
      <time id="t-tot">00:00</time>
    </div>

    <div id="transport">
      <div class="t-label">
        <button class="t-btn" id="btn-back" aria-label="Voltar uma frase">
          <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><polyline points="11 19 4 12 11 5"></polyline><polyline points="20 19 13 12 20 5"></polyline></svg>
        </button>
        <span>FRASE</span>
      </div>
      <div class="t-label">
        <button class="t-btn" id="btn-play" aria-label="Reproduzir ou pausar">
          <svg id="icon-play" width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><polygon points="7 4 21 12 7 20"></polygon></svg>
          <svg id="icon-pause" width="24" height="24" viewBox="0 0 24 24" fill="currentColor" style="display:none"><rect x="6" y="4" width="4" height="16"></rect><rect x="14" y="4" width="4" height="16"></rect></svg>
        </button>
        <span>&nbsp;</span>
      </div>
      <div class="t-label">
        <button class="t-btn" id="btn-exp" aria-label="Explorador de conteúdo">
          <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><line x1="4" y1="6" x2="20" y2="6"></line><line x1="4" y1="12" x2="20" y2="12"></line><line x1="4" y1="18" x2="14" y2="18"></line></svg>
        </button>
        <span>EXPLORAR</span>
      </div>
    </div>

    <div id="tempo">
      <div class="fader-wrap">
        <div class="fader-ticks"></div>
        <input type="range" id="fader" min="120" max="700" step="10" value="300" aria-label="Velocidade em palavras por minuto">
      </div>
      <div id="tempo-readout">300<small>WPM</small></div>
    </div>

    <div id="dwell-row">
      <label>PAUSA DE FRASE</label>
      <div class="seg" id="dwell-seg">
        <button data-v="2.2">CURTA</button>
        <button data-v="3.0" class="on">MÉDIA</button>
        <button data-v="4.0">LONGA</button>
      </div>
    </div>
  </div>
</div>

<!-- ================= IMPORT ================= -->
<div class="sheet" id="sheet-import">
  <div class="sheet-head">
    <button data-close="sheet-import">✕</button>
    <h2>IMPORTAR</h2>
  </div>
  <button class="imp-opt" id="imp-paste">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="8" y="2" width="8" height="4" rx="1"></rect><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"></path></svg>
    <span>Colar texto<small>qualquer coisa que você copiar</small></span>
  </button>
  <button class="imp-opt" id="imp-file">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline></svg>
    <span>Arquivo<small>EPUB, PDF ou TXT</small></span>
  </button>
  <button class="imp-opt sample" id="imp-sample">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><line x1="4" y1="7" x2="20" y2="7"></line><line x1="4" y1="12" x2="16" y2="12"></line><line x1="4" y1="17" x2="12" y2="17"></line></svg>
    <span>Experimentar amostra<small>texto de demonstração</small></span>
  </button>
  <input type="file" id="file-input" accept=".txt,.epub,.pdf" style="display:none">
</div>

<!-- ================= PASTE ================= -->
<div class="sheet" id="sheet-paste">
  <div class="sheet-head">
    <button data-close="sheet-paste">✕</button>
    <h2>COLAR TEXTO</h2>
  </div>
  <textarea id="ta" placeholder="Cole aqui qualquer texto — artigo, capítulo, documento…"></textarea>
  <div class="sheet-actions">
    <button class="btn-ghost" data-close="sheet-paste">CANCELAR</button>
    <button class="btn-solid" id="btn-load">CARREGAR</button>
  </div>
</div>

<!-- ================= EXPLORER ================= -->
<div class="sheet" id="sheet-exp">
  <div class="sheet-head">
    <button data-close="sheet-exp">✕</button>
    <h2>EXPLORADOR DE CONTEÚDO</h2>
  </div>
  <div id="exp-body"></div>
</div>

<div id="busy">PROCESSANDO…</div>

<script>
(function () {
  "use strict";

  /* ============ safe storage (funciona hospedado; degrada em preview) ============ */
  var mem = {};
  var store = {
    get: function (k) {
      try { return localStorage.getItem(k); } catch (e) { return mem[k] !== undefined ? mem[k] : null; }
    },
    set: function (k, v) {
      try { localStorage.setItem(k, v); return true; }
      catch (e) { mem[k] = v; return false; }
    },
    del: function (k) {
      try { localStorage.removeItem(k); } catch (e) {} delete mem[k];
    }
  };

  /* ============ sample ============ */
  var SAMPLE =
    "Isto é o FLUXO, seu leitor RSVP. Em vez de mover os olhos pela página, você mantém o olhar fixo num único ponto e as palavras vêm até você, uma de cada vez.\n\n" +
    "A letra vermelha marca o ponto de reconhecimento ótimo: é onde seu olho trava, um pouco à esquerda do centro da palavra. Com o ponto fixo, o cérebro para de gastar energia procurando a próxima palavra e usa tudo para entender o texto.\n\n" +
    "Repare que o ritmo não é constante. Palavras longas ficam mais tempo na tela. Vírgulas respiram, pontos finais respiram mais, e parágrafos fazem uma pausa de verdade. Você controla o tamanho da pausa de frase ali embaixo: curta, média ou longa.\n\n" +
    "Quando você pausa, a frase inteira aparece embaixo, com a palavra atual marcada. Arraste o dedo sobre esta área para percorrer o texto, como quem passa o dedo no vinil. O explorador mostra o texto completo: toque em qualquer parágrafo para pular até ele.\n\n" +
    "O fader controla o tempo, como um pitch: comece em 300, ache seu groove, e vá subindo aos poucos. Seu progresso fica salvo na biblioteca — feche, volte amanhã, e continue de onde parou.";

  /* ============ state ============ */
  var tokens = [], paras = [], paraStart = [], sentenceStarts = [];
  var idx = 0, playing = false, timer = null;
  var wpm = parseInt(store.get("fluxo:wpm") || "300", 10);
  var dwell = parseFloat(store.get("fluxo:dwell") || "3.0");
  var curDoc = null;
  var PACE_AVG = 1.18;
  var lastSaveIdx = -1;
  var SAVE_EVERY = 12; /* grava a cada 12 palavras durante a leitura */

  /* ============ dom ============ */
  function $(id) { return document.getElementById(id); }
  var elPre = $("w-pre"), elPiv = $("w-piv"), elPost = $("w-post");
  var elPct = $("rd-pct"), elTitle = $("rd-title");
  var elHint = $("hint"), elCtx = $("context");
  var elStage = $("stage"), elWordRow = $("word-row"), elWordInner = $("word-inner");
  var iconPlay = $("icon-play"), iconPause = $("icon-pause");
  var btnPlay = $("btn-play");
  var scrub = $("scrub"), tCur = $("t-cur"), tTot = $("t-tot");
  var fader = $("fader"), readout = $("tempo-readout");

  /* ============ docs ============ */
  function loadMeta() {
    try { return JSON.parse(store.get("fluxo:meta") || "[]"); } catch (e) { return []; }
  }
  function saveMeta(m) { store.set("fluxo:meta", JSON.stringify(m)); }

  function addDoc(title, text) {
    var m = loadMeta();
    var id = "d" + Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
    var words = text.split(/\s+/).filter(Boolean).length;
    var ok = store.set("fluxo:text:" + id, text);
    if (!ok) {
      alert("Não foi possível salvar (armazenamento cheio ou indisponível). O texto abre mesmo assim, mas o progresso não vai persistir.");
      mem["fluxo:text:" + id] = text;
    }
    m.unshift({ id: id, title: title, words: words, idx: 0, added: Date.now() });
    saveMeta(m);
    return m[0];
  }

  function deleteDoc(id) {
    saveMeta(loadMeta().filter(function (d) { return d.id !== id; }));
    store.del("fluxo:text:" + id);
  }

  function saveProgress() {
    if (!curDoc) return;
    var m = loadMeta();
    for (var i = 0; i < m.length; i++) {
      if (m[i].id === curDoc.id) {
        m[i].idx = idx;
        m[i].seen = Date.now();
        break;
      }
    }
    saveMeta(m);
    store.set("fluxo:last", curDoc.id);
    lastSaveIdx = idx;
  }

  /* grava sozinho durante a leitura, sem pesar */
  function autoSave() {
    if (!curDoc) return;
    if (Math.abs(idx - lastSaveIdx) >= SAVE_EVERY) saveProgress();
  }

  function fmtTime(sec) {
    sec = Math.max(0, Math.round(sec));
    var h = Math.floor(sec / 3600), mn = Math.floor((sec % 3600) / 60), s = sec % 60;
    var p = function (n) { return String(n).padStart(2, "0"); };
    return h ? h + ":" + p(mn) + ":" + p(s) : p(mn) + ":" + p(s);
  }

  /* trecho de onde você parou, para o card de continuar */
  function snippetAt(docId, wordIdx) {
    var text = store.get("fluxo:text:" + docId);
    if (!text) return "";
    var words = text.replace(/\s+/g, " ").trim().split(" ");
    var start = Math.max(0, wordIdx - 2);
    var s = words.slice(start, start + 22).join(" ");
    return (start > 0 ? "…" : "") + s + "…";
  }

  function renderContinue() {
    var card = $("continue");
    var lastId = store.get("fluxo:last");
    if (!lastId) { card.classList.remove("show"); return; }
    var m = loadMeta();
    var d = null;
    for (var i = 0; i < m.length; i++) { if (m[i].id === lastId) { d = m[i]; break; } }
    if (!d || !d.idx) { card.classList.remove("show"); return; }

    var total = Math.max(1, d.words);
    var pct = Math.min(100, Math.round((d.idx / total) * 100));
    var mins = Math.max(1, Math.ceil(((total - d.idx) * PACE_AVG) / wpm));
    $("ct-title").textContent = d.title;
    $("ct-snip").textContent = snippetAt(d.id, d.idx);
    $("ct-meta").textContent = pct + "% lido · faltam " + mins + "min";
    card.classList.add("show");
    card.onclick = function () { openDoc(d); };
  }

  function renderLibrary() {
    renderContinue();
    var m = loadMeta();
    var list = $("doc-rows");
    list.innerHTML = "";
    if (!m.length) {
      var e = document.createElement("div");
      e.id = "empty";
      e.textContent = "Nenhum documento ainda. Toque em + para colar um texto, importar um EPUB ou experimentar a amostra.";
      list.appendChild(e);
      return;
    }
    m.forEach(function (d) {
      var total = Math.max(1, d.words);
      var pct = Math.min(100, Math.round(((d.idx || 0) / total) * 100));
      var mins = Math.max(1, Math.ceil(((total - (d.idx || 0)) * PACE_AVG) / wpm));

      var row = document.createElement("div");
      row.className = "doc-row";

      var info = document.createElement("div");
      info.className = "doc-info";
      var t = document.createElement("div");
      t.className = "doc-title";
      t.textContent = d.title;
      var meta = document.createElement("div");
      meta.className = "doc-meta";
      var b1 = document.createElement("span");
      b1.className = "doc-badge";
      b1.textContent = "◔ " + mins + "min";
      meta.appendChild(b1);
      if (pct > 0) {
        var b2 = document.createElement("span");
        b2.className = "doc-badge reading";
        b2.textContent = pct + "%";
        meta.appendChild(b2);
      }
      var prog = document.createElement("div");
      prog.className = "doc-prog";
      var bar = document.createElement("i");
      bar.style.width = pct + "%";
      prog.appendChild(bar);
      info.appendChild(t);
      info.appendChild(meta);
      info.appendChild(prog);

      var del = document.createElement("button");
      del.className = "doc-del";
      del.textContent = "✕";
      del.setAttribute("aria-label", "Apagar documento");
      del.addEventListener("click", function (ev) {
        ev.stopPropagation();
        if (del.classList.contains("confirm")) {
          deleteDoc(d.id);
          renderLibrary();
        } else {
          del.classList.add("confirm");
          setTimeout(function () { del.classList.remove("confirm"); }, 2500);
        }
      });

      row.appendChild(info);
      row.appendChild(del);
      row.addEventListener("click", function () { openDoc(d); });
      list.appendChild(row);
    });
  }

  /* ============ tokenizer ============ */
  function tokenize(text) {
    tokens = []; paras = []; paraStart = []; sentenceStarts = [0];
    var blocks = text.replace(/\r/g, "").split(/\n\s*\n+/);
    for (var p = 0; p < blocks.length; p++) {
      var raw = blocks[p].replace(/\n/g, " ").trim();
      if (!raw) continue;
      var pi = paras.length;
      paras.push(raw);
      paraStart.push(tokens.length);
      var words = raw.split(/\s+/).filter(Boolean);
      for (var i = 0; i < words.length; i++) {
        var w = words[i];
        var kind = 0; /* 0 normal, 1 vírgula, 2 fim de frase, 3 fim de parágrafo */
        if (/[.!?…]["'”)\]]?$/.test(w)) kind = 2;
        else if (/[,;:—–]["'”)\]]?$/.test(w)) kind = 1;
        if (i === words.length - 1) kind = 3;
        tokens.push({ w: w, k: kind, pi: pi });
        if (kind >= 2) sentenceStarts.push(tokens.length);
      }
    }
    while (sentenceStarts.length && sentenceStarts[sentenceStarts.length - 1] >= tokens.length) sentenceStarts.pop();
    if (!sentenceStarts.length) sentenceStarts = [0];
  }

  function sentenceOf(i) {
    var lo = 0, hi = sentenceStarts.length - 1, ans = 0;
    while (lo <= hi) {
      var mid = (lo + hi) >> 1;
      if (sentenceStarts[mid] <= i) { ans = mid; lo = mid + 1; } else { hi = mid - 1; }
    }
    return ans;
  }

  /* ============ ORP ============ */
  var LEAD_PUNCT = /^[^A-Za-zÀ-ÖØ-öø-ÿ0-9]+/;
  function orpOffset(len) {
    if (len <= 1) return 0;
    if (len <= 5) return 1;
    if (len <= 9) return 2;
    if (len <= 13) return 3;
    return 4;
  }

  /* ============ render ============ */
  function renderWord() {
    if (!tokens.length) return;
    if (idx > tokens.length - 1) idx = tokens.length - 1;
    if (idx < 0) idx = 0;
    var w = tokens[idx].w;
    var stripped = w.replace(LEAD_PUNCT, "");
    var lead = w.length - stripped.length;
    var o = lead + orpOffset(stripped.length || w.length);
    if (o >= w.length) o = Math.max(0, w.length - 1);
    elPre.textContent = w.slice(0, o);
    elPiv.textContent = w.charAt(o);
    elPost.textContent = w.slice(o + 1);

    var size = 42;
    if (w.length > 11) size = 34;
    if (w.length > 16) size = 27;
    if (w.length > 22) size = 21;
    elWordRow.style.setProperty("--word-size", size + "px");

    /* trava o centro da letra pivô exatamente sobre a guia */
    var off = elPre.getBoundingClientRect().width + elPiv.getBoundingClientRect().width / 2;
    elWordInner.style.transform = "translate(" + (-off).toFixed(2) + "px, -50%)";

    var pct = Math.round((idx / Math.max(1, tokens.length - 1)) * 100);
    elPct.textContent = pct + "%";
    scrub.value = idx;
    tCur.textContent = fmtTime((idx * PACE_AVG * 60) / wpm);
  }

  function renderTotals() {
    scrub.max = Math.max(0, tokens.length - 1);
    tTot.textContent = fmtTime((tokens.length * PACE_AVG * 60) / wpm);
  }

  function renderContext() {
    if (!tokens.length) return;
    var s = sentenceOf(idx);
    var start = sentenceStarts[s];
    var end = (s + 1 < sentenceStarts.length) ? sentenceStarts[s + 1] : tokens.length;
    var html = "";
    for (var j = start; j < end; j++) {
      var safe = tokens[j].w.replace(/&/g, "&amp;").replace(/</g, "&lt;");
      html += (j === idx ? "<mark>" + safe + "</mark>" : safe) + " ";
    }
    elCtx.innerHTML = html;
  }

  function showContext() { renderContext(); elCtx.style.display = "block"; }
  function hideContext() { elCtx.style.display = "none"; }

  /* ============ timing ============ */
  function durationFor(tok) {
    var base = 60000 / wpm;
    var lenBoost = 1 + Math.max(0, tok.w.length - 6) * 0.03;
    if (lenBoost > 1.4) lenBoost = 1.4;
    if (/\d/.test(tok.w)) lenBoost = Math.max(lenBoost, 1.25);
    var pause = 1;
    if (tok.k === 1) pause = 1.7;
    else if (tok.k === 2) pause = dwell;          /* fim de frase — ajustável */
    else if (tok.k === 3) pause = dwell + 1.2;    /* fim de parágrafo */
    return base * lenBoost * pause;
  }

  function tick() {
    if (!playing) return;
    renderWord();
    autoSave();
    timer = setTimeout(function () {
      if (idx < tokens.length - 1) { idx++; tick(); }
      else { finish(); }
    }, durationFor(tokens[idx]));
  }

  /* ============ transport ============ */
  function setPlayUI(on) {
    btnPlay.classList.toggle("playing", on);
    iconPlay.style.display = on ? "none" : "block";
    iconPause.style.display = on ? "block" : "none";
  }

  function play() {
    if (!tokens.length || playing) return;
    playing = true;
    setPlayUI(true);
    elHint.style.display = "none";
    hideContext();
    tick();
  }

  function pause(withBrake) {
    playing = false;
    setPlayUI(false);
    clearTimeout(timer);
    if (withBrake) idx = Math.max(0, idx - 2);
    renderWord();
    showContext();
    saveProgress();
  }

  function finish() {
    playing = false;
    setPlayUI(false);
    clearTimeout(timer);
    elHint.innerHTML = "fim · toque para reler";
    elHint.style.display = "block";
    hideContext();
    idx = 0;
    renderWord();
    saveProgress();
  }

  function toggle() { playing ? pause(true) : play(); }

  function backSentence() {
    var s = sentenceOf(idx);
    var startOfCurrent = sentenceStarts[s];
    idx = (idx - startOfCurrent < 3 && s > 0) ? sentenceStarts[s - 1] : startOfCurrent;
    renderWord();
    if (!playing) showContext();
  }

  /* ============ open / close docs ============ */
  function openDoc(meta) {
    var text = store.get("fluxo:text:" + meta.id);
    if (text === null) {
      alert("O texto deste documento não foi encontrado no armazenamento.");
      deleteDoc(meta.id);
      renderLibrary();
      return;
    }
    curDoc = meta;
    tokenize(text);
    idx = Math.min(meta.idx || 0, Math.max(0, tokens.length - 1));

    var resuming = idx > 0;
    if (resuming) {
      /* volta ao início da frase: ninguém retoma no meio de uma oração */
      idx = sentenceStarts[sentenceOf(idx)];
    }
    lastSaveIdx = idx;

    elTitle.textContent = meta.title;
    /* a tela precisa estar visível ANTES de medir a palavra: em elemento
       oculto o navegador devolve largura zero e o pivô sai do lugar */
    $("view-lib").classList.remove("active");
    $("view-reader").classList.add("active");

    renderTotals();
    renderWord();
    if (resuming) {
      showContext();
      elHint.innerHTML = "retomando em " + elPct.textContent + " · do início da frase<br>toque para continuar";
    } else {
      hideContext();
      elHint.innerHTML = "toque para começar · toque para pausar<br>arraste para percorrer o texto";
    }
    elHint.style.display = "block";
  }

  function openText(title, text) {
    var meta = addDoc(title, text);
    renderLibrary();
    openDoc(meta);
  }

  $("rd-close").addEventListener("click", function () {
    playing = false;
    clearTimeout(timer);
    setPlayUI(false);
    saveProgress();
    curDoc = null;
    $("view-reader").classList.remove("active");
    $("view-lib").classList.add("active");
    renderLibrary();
  });

  /* ============ stage: tap + drag scrub ============ */
  var drag = { on: false, x0: 0, i0: 0, moved: false, wasPlaying: false };
  elStage.addEventListener("pointerdown", function (e) {
    if (!tokens.length) return;
    drag.on = true; drag.moved = false;
    drag.x0 = e.clientX; drag.i0 = idx;
    drag.wasPlaying = playing;
    if (playing) { playing = false; clearTimeout(timer); }
    try { elStage.setPointerCapture(e.pointerId); } catch (err) {}
  });
  elStage.addEventListener("pointermove", function (e) {
    if (!drag.on) return;
    var dx = e.clientX - drag.x0;
    if (Math.abs(dx) > 6) drag.moved = true;
    if (drag.moved) {
      idx = Math.max(0, Math.min(tokens.length - 1, drag.i0 + Math.round(dx / 9)));
      renderWord();
      showContext();
      elHint.style.display = "none";
    }
  });
  elStage.addEventListener("pointerup", function () {
    if (!drag.on) return;
    drag.on = false;
    if (drag.moved) {
      saveProgress();
      if (drag.wasPlaying) { hideContext(); playing = true; setPlayUI(true); tick(); }
    } else if (drag.wasPlaying) {
      idx = Math.max(0, idx - 2); /* freio */
      renderWord();
      showContext();
      setPlayUI(false);
      saveProgress();
    } else {
      play();
    }
  });
  elStage.addEventListener("pointercancel", function () { drag.on = false; });

  btnPlay.addEventListener("click", function (e) { e.stopPropagation(); toggle(); });
  $("btn-back").addEventListener("click", function (e) {
    e.stopPropagation();
    clearTimeout(timer);
    backSentence();
    if (playing) tick();
  });

  /* ============ scrubber ============ */
  var scrubWasPlaying = false;
  scrub.addEventListener("pointerdown", function () {
    scrubWasPlaying = playing;
    if (playing) { playing = false; clearTimeout(timer); setPlayUI(false); }
  });
  scrub.addEventListener("input", function () {
    idx = parseInt(scrub.value, 10) || 0;
    renderWord();
    showContext();
    elHint.style.display = "none";
  });
  scrub.addEventListener("change", function () {
    saveProgress();
    if (scrubWasPlaying) {
      scrubWasPlaying = false;
      hideContext();
      playing = true;
      setPlayUI(true);
      tick();
    }
  });

  /* ============ fader / dwell ============ */
  readout.innerHTML = wpm + "<small>WPM</small>";
  fader.value = wpm;
  fader.addEventListener("input", function () {
    wpm = parseInt(fader.value, 10);
    readout.innerHTML = wpm + "<small>WPM</small>";
    store.set("fluxo:wpm", String(wpm));
    renderTotals();
    tCur.textContent = fmtTime((idx * PACE_AVG * 60) / wpm);
    if (playing) { clearTimeout(timer); tick(); }
  });

  var segBtns = Array.prototype.slice.call($("dwell-seg").querySelectorAll("button"));
  segBtns.forEach(function (b) {
    if (parseFloat(b.dataset.v) === dwell) {
      segBtns.forEach(function (x) { x.classList.remove("on"); });
      b.classList.add("on");
    }
    b.addEventListener("click", function () {
      segBtns.forEach(function (x) { x.classList.remove("on"); });
      b.classList.add("on");
      dwell = parseFloat(b.dataset.v);
      store.set("fluxo:dwell", String(dwell));
    });
  });

  /* ============ sheets ============ */
  function openSheet(id) { $(id).classList.add("open"); }
  function closeSheet(id) { $(id).classList.remove("open"); }
  Array.prototype.slice.call(document.querySelectorAll("[data-close]")).forEach(function (b) {
    b.addEventListener("click", function () { closeSheet(b.getAttribute("data-close")); });
  });

  $("btn-add").addEventListener("click", function () { openSheet("sheet-import"); });
  $("imp-paste").addEventListener("click", function () {
    closeSheet("sheet-import");
    openSheet("sheet-paste");
    setTimeout(function () { $("ta").focus(); }, 60);
  });
  $("imp-sample").addEventListener("click", function () {
    closeSheet("sheet-import");
    openText("Como usar o FLUXO", SAMPLE);
  });
  $("btn-load").addEventListener("click", function () {
    var t = $("ta").value.trim();
    if (!t) return;
    var title = t.split(/\s+/).slice(0, 6).join(" ");
    if (title.length > 42) title = title.slice(0, 42) + "…";
    $("ta").value = "";
    closeSheet("sheet-paste");
    openText(title, t);
  });

  /* ============ file import ============ */
  $("imp-file").addEventListener("click", function () { $("file-input").click(); });
  $("file-input").addEventListener("change", function () {
    var f = this.files && this.files[0];
    this.value = "";
    if (!f) return;
    closeSheet("sheet-import");
    var name = f.name.replace(/\.(txt|epub|pdf)$/i, "");
    if (/\.epub$/i.test(f.name)) {
      importEpub(f, name);
    } else if (/\.pdf$/i.test(f.name)) {
      importPdf(f, name);
    } else {
      f.text().then(function (t) { openText(name, t); })
        .catch(function () { alert("Não consegui ler este arquivo."); });
    }
  });

  var jszipPromise = null;
  function loadJSZip() {
    if (window.JSZip) return Promise.resolve();
    if (jszipPromise) return jszipPromise;
    jszipPromise = new Promise(function (res, rej) {
      var s = document.createElement("script");
      s.src = "https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js";
      s.onload = res;
      s.onerror = function () { jszipPromise = null; rej(new Error("jszip")); };
      document.head.appendChild(s);
    });
    return jszipPromise;
  }

  var pdfjsPromise = null;
  function loadPdfJs() {
    if (window.pdfjsLib) return Promise.resolve();
    if (pdfjsPromise) return pdfjsPromise;
    pdfjsPromise = new Promise(function (res, rej) {
      var s = document.createElement("script");
      s.src = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js";
      s.onload = function () {
        window.pdfjsLib.GlobalWorkerOptions.workerSrc =
          "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
        res();
      };
      s.onerror = function () { pdfjsPromise = null; rej(new Error("pdfjs")); };
      document.head.appendChild(s);
    });
    return pdfjsPromise;
  }

  function importPdf(file, fallbackTitle) {
    $("busy").classList.add("open");
    var reader = new FileReader();
    reader.onerror = function () {
      $("busy").classList.remove("open");
      alert("Não consegui ler este arquivo.");
    };
    reader.onload = function () {
      var data = new Uint8Array(reader.result);
      loadPdfJs().then(function () {
        return window.pdfjsLib.getDocument({ data: data }).promise;
      }).then(function (pdf) {
        var pageChain = Promise.resolve([]);
        var _loop = function (pageNum) {
          pageChain = pageChain.then(function (acc) {
            return pdf.getPage(pageNum).then(function (page) {
              return page.getTextContent().then(function (tc) {
                // agrupa itens em parágrafos usando os saltos verticais entre linhas
                var lines = [];
                var lastY = null, buf = [];
                tc.items.forEach(function (it) {
                  var y = it.transform[5];
                  if (lastY !== null && Math.abs(y - lastY) > 3) {
                    lines.push(buf.join(""));
                    buf = [];
                  }
                  buf.push(it.str);
                  lastY = y;
                });
                if (buf.length) lines.push(buf.join(""));

                var paras = [];
                var cur = [];
                lines.forEach(function (ln) {
                  var t = ln.trim();
                  if (!t) { if (cur.length) { paras.push(cur.join(" ")); cur = []; } return; }
                  cur.push(t);
                  if (/[.!?…]["'”)\]]?$/.test(t)) { paras.push(cur.join(" ")); cur = []; }
                });
                if (cur.length) paras.push(cur.join(" "));

                acc.push(paras.join("\n\n"));
                return acc;
              });
            });
          });
        };
        for (var pageNum = 1; pageNum <= pdf.numPages; pageNum++) _loop(pageNum);

        return pageChain.then(function (pageTexts) {
          $("busy").classList.remove("open");
          var fullText = pageTexts.join("\n\n").trim();
          if (!fullText) { alert("Não encontrei texto neste PDF (pode ser um PDF escaneado, sem camada de texto)."); return; }
          openText(fallbackTitle, fullText);
        });
      }).catch(function () {
        $("busy").classList.remove("open");
        alert("Não consegui abrir este PDF.");
      });
    };
    reader.readAsArrayBuffer(file);
  }

  function importEpub(file, fallbackTitle) {
    $("busy").classList.add("open");
    loadJSZip().then(function () {
      return window.JSZip.loadAsync(file);
    }).then(function (zip) {
      var cf = zip.file("META-INF/container.xml");
      if (!cf) throw new Error("container");
      return cf.async("string").then(function (containerXml) {
        var m = /full-path="([^"]+)"/.exec(containerXml);
        if (!m) throw new Error("opf-path");
        var opfPath = m[1];
        var of = zip.file(opfPath);
        if (!of) throw new Error("opf");
        return of.async("string").then(function (opfXml) {
          var dir = opfPath.split("/").slice(0, -1).join("/");
          var doc = new DOMParser().parseFromString(opfXml, "application/xml");

          var title = fallbackTitle;
          var tEls = doc.getElementsByTagNameNS("*", "title");
          if (tEls.length && tEls[0].textContent.trim()) title = tEls[0].textContent.trim();

          var manifest = {};
          var items = doc.getElementsByTagNameNS("*", "item");
          for (var i = 0; i < items.length; i++) {
            manifest[items[i].getAttribute("id")] = items[i].getAttribute("href");
          }
          var refs = doc.getElementsByTagNameNS("*", "itemref");
          var order = [];
          for (var r = 0; r < refs.length; r++) {
            var href = manifest[refs[r].getAttribute("idref")];
            if (href) order.push(href);
          }

          var chain = Promise.resolve("");
          order.forEach(function (href) {
            chain = chain.then(function (acc) {
              var clean = decodeURIComponent(href.split("#")[0]);
              var path = dir ? dir + "/" + clean : clean;
              path = path.replace(/^\.\//, "");
              var zf = zip.file(path);
              if (!zf) return acc;
              return zf.async("string").then(function (html) {
                var d2 = new DOMParser().parseFromString(html, "text/html");
                Array.prototype.slice.call(d2.querySelectorAll("script,style")).forEach(function (e) { e.remove(); });
                var nodes = d2.body ? d2.body.querySelectorAll("p,h1,h2,h3,h4,h5,h6,li,blockquote,dd,dt") : [];
                var parts = [];
                Array.prototype.slice.call(nodes).forEach(function (n) {
                  if (n.querySelector && n.querySelector("p,h1,h2,h3,h4,h5,h6,li,blockquote")) return;
                  var t = n.textContent.replace(/\s+/g, " ").trim();
                  if (t) parts.push(t);
                });
                if (!parts.length && d2.body) {
                  var t2 = d2.body.textContent.replace(/\s+/g, " ").trim();
                  if (t2) parts.push(t2);
                }
                return parts.length ? acc + parts.join("\n\n") + "\n\n" : acc;
              });
            });
          });

          return chain.then(function (fullText) {
            $("busy").classList.remove("open");
            fullText = fullText.trim();
            if (!fullText) { alert("Não encontrei texto neste EPUB."); return; }
            openText(title, fullText);
          });
        });
      });
    }).catch(function () {
      $("busy").classList.remove("open");
      alert("Não consegui abrir este EPUB. Verifique se o arquivo não tem DRM.");
    });
  }

  /* ============ explorer ============ */
  $("btn-exp").addEventListener("click", function (e) {
    e.stopPropagation();
    if (playing) pause(false);
    var body = $("exp-body");
    body.innerHTML = "";
    var curPi = tokens.length ? tokens[idx].pi : -1;
    var frag = document.createDocumentFragment();
    var currentEl = null;
    paras.forEach(function (p, i) {
      var d = document.createElement("div");
      d.className = "exp-p" + (i === curPi ? " current" : "");
      d.textContent = p;
      d.addEventListener("click", function () {
        idx = paraStart[i];
        renderWord();
        showContext();
        elHint.style.display = "none";
        saveProgress();
        closeSheet("sheet-exp");
      });
      if (i === curPi) currentEl = d;
      frag.appendChild(d);
    });
    body.appendChild(frag);
    openSheet("sheet-exp");
    if (currentEl) currentEl.scrollIntoView({ block: "center" });
  });

  /* ============ keyboard (desktop) ============ */
  document.addEventListener("keydown", function (e) {
    if (document.querySelector(".sheet.open")) return;
    if (!$("view-reader").classList.contains("active")) return;
    if (e.code === "Space") { e.preventDefault(); toggle(); }
    if (e.code === "ArrowLeft") { clearTimeout(timer); backSentence(); if (playing) tick(); }
    if (e.code === "ArrowUp") { fader.value = Math.min(700, wpm + 10); fader.dispatchEvent(new Event("input")); }
    if (e.code === "ArrowDown") { fader.value = Math.max(120, wpm - 10); fader.dispatchEvent(new Event("input")); }
  });

  /* ============ lifecycle ============ */
  window.addEventListener("resize", function () {
    if ($("view-reader").classList.contains("active")) renderWord();
  });
  window.addEventListener("pagehide", saveProgress);
  document.addEventListener("visibilitychange", function () {
    if (document.hidden) {
      if (playing) pause(true);
      saveProgress();
    }
  });

  /* ============ init ============ */
  if (!loadMeta().length) {
    addDoc("Como usar o FLUXO", SAMPLE);
  }
  renderLibrary();
})();
</script>
